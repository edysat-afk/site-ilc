<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Área do Membro · ILC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0B2545', 800: '#0d2e57', 700: '#113a6b', 600: '#1a4f8a' },
            gold:  { 500: '#C8960C', 400: '#dba81a', 300: '#e8c44a' },
          },
          fontFamily: { sans: ['Inter','sans-serif'], serif: ['Playfair Display','serif'] }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    .form-input {
      width:100%; border:1.5px solid #e5e7eb; border-radius:10px; padding:12px 16px;
      font-size:.875rem; transition:border-color .2s, box-shadow .2s; outline:none;
      font-family: 'Inter', sans-serif;
    }
    .form-input:focus { border-color:#0B2545; box-shadow: 0 0 0 3px rgba(11,37,69,.08); }
    .hero-bg { background: linear-gradient(135deg, #0B2545 0%, #113a6b 50%, #0d2e57 100%); }
  </style>
</head>
<body class="font-sans bg-gray-50">

  <div class="min-h-screen hero-bg flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Decorative bg -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-gold-500/5 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-64 h-64 bg-blue-400/5 rounded-full translate-x-1/3 translate-y-1/3"></div>

    <div class="w-full max-w-md relative z-10">

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-2xl p-8 md:p-10">

        <!-- Logo -->
        <div class="text-center mb-8">
          <a href="index.html" class="inline-flex items-center gap-3 mb-6">
            <div class="w-12 h-12 bg-navy-900 rounded-xl flex items-center justify-center">
              <span class="text-gold-400 font-serif font-bold text-xl">ILC</span>
            </div>
            <div class="text-left">
              <p class="text-navy-900 font-semibold text-sm leading-tight">Infraestrutura e</p>
              <p class="text-gold-500 font-semibold text-sm leading-tight">Logística Conectada</p>
            </div>
          </a>
          <h1 class="font-serif text-2xl font-bold text-navy-900 mb-1">Área do Membro</h1>
          <p class="text-gray-500 text-sm">Acesse o conteúdo exclusivo do Mastermind ILC</p>
        </div>

        <!-- Form -->
        <form onsubmit="handleLogin(event)">
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Usuário ou E-mail</label>
            <input type="text" placeholder="seu@email.com.br" class="form-input" required />
          </div>
          <div class="mb-2">
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Senha</label>
            <div class="relative">
              <input type="password" id="passInput" placeholder="••••••••" class="form-input pr-10" required />
              <button type="button" onclick="togglePass()" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between mb-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" class="w-4 h-4 accent-navy-900" />
              <span class="text-sm text-gray-600">Lembrar-me</span>
            </label>
            <a href="#" class="text-gold-500 text-sm font-medium hover:underline">Esqueci minha senha</a>
          </div>

          <button type="submit" class="w-full bg-navy-900 hover:bg-navy-800 text-white font-semibold py-3.5 rounded-xl transition-all hover:shadow-lg">
            Entrar
          </button>
        </form>

        <div class="mt-6 pt-5 border-t border-gray-100 text-center">
          <p class="text-gray-500 text-sm">
            Não é membro ainda?
            <a href="contato.html" class="text-gold-500 font-semibold hover:underline">Entre em contato</a>
          </p>
        </div>

        <div class="mt-4 text-center">
          <a href="index.html" class="text-gray-400 hover:text-navy-900 text-sm transition-colors flex items-center justify-center gap-1">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Voltar ao site
          </a>
        </div>

      </div>

      <!-- Footer note -->
      <p class="text-center text-blue-300/60 text-xs mt-6">© 2026 ILC INFRA E LOGÍSTICA · Todos os direitos reservados</p>
    </div>
  </div>

  <script>
    function togglePass() {
      const inp = document.getElementById('passInput');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
    function handleLogin(e) {
      e.preventDefault();
      // Demo: redirect to mastermind
      window.location.href = 'mastermind.html';
    }
  </script>

</body>
</html>
